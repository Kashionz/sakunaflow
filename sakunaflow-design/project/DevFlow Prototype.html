<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevFlow — 設計探索</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; height: 100%; }
  body { font-family: 'Inter','Noto Sans TC',sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.15); border-radius: 3px; }
</style>
</head>
<body>
<div id="root"></div>
<script src="devflow/data.js"></script>
<script src="devflow/themes.js"></script>
<script type="text/babel" src="devflow/components.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const SCREENS = [
  { id: 'today',    label: '今日' },
  { id: 'pomodoro', label: '番茄鐘' },
  { id: 'calendar', label: '月曆' },
  { id: 'projects', label: '專案' },
  { id: 'stats',    label: '統計' },
  { id: 'settings', label: '設定' },
];

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{"screen":"today","themeId":"A"}/*EDITMODE-END*/;

function App() {
  const [mode, setMode]       = useState('compare'); // compare | explore
  const [expTheme, setExpTheme] = useState('A');
  const [screen, setScreen]   = useState(TWEAK_DEFAULTS.screen || 'today');
  const [platform, setPlatform] = useState('desktop');
  const [tweaks, setTweaks]   = useState(false);

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaks(false);
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const themes = window.DF_THEMES;

  /* ── Explore mode ── */
  if (mode === 'explore') {
    const theme = themes[expTheme];
    return (
      <div style={{ width: '100vw', height: '100vh', display: 'flex', flexDirection: 'column',
        background: '#111', fontFamily: "'Inter','Noto Sans TC',sans-serif" }}>
        {/* Top bar */}
        <div style={{ height: 48, padding: '0 24px', display: 'flex', alignItems: 'center', gap: 16,
          borderBottom: '1px solid rgba(255,255,255,0.08)', flexShrink: 0, background: '#161614' }}>
          <button onClick={() => setMode('compare')}
            style={{ color: 'rgba(255,255,255,0.5)', background: 'none', border: 'none',
              cursor: 'pointer', fontSize: 13, fontFamily: 'inherit', display: 'flex', alignItems: 'center', gap: 4 }}>
            ← 返回比較
          </button>
          <span style={{ color: 'rgba(255,255,255,0.2)' }}>|</span>
          <div style={{ display: 'flex', gap: 6 }}>
            {['A','B','C'].map(tid => (
              <button key={tid} onClick={() => setExpTheme(tid)}
                style={{ padding: '3px 10px', borderRadius: 6,
                  background: expTheme === tid ? 'rgba(255,255,255,0.12)' : 'transparent',
                  color: expTheme === tid ? 'white' : 'rgba(255,255,255,0.45)',
                  border: `1px solid ${expTheme === tid ? 'rgba(255,255,255,0.2)' : 'transparent'}`,
                  cursor: 'pointer', fontSize: 12, fontFamily: 'inherit', fontWeight: expTheme === tid ? 600 : 400 }}>
                {tid} · {themes[tid].name}
              </button>
            ))}
          </div>
          <div style={{ marginLeft: 'auto', display: 'flex', gap: 6 }}>
            {[['desktop','桌面'],['ios','iOS']].map(([p,l]) => (
              <button key={p} onClick={() => setPlatform(p)}
                style={{ padding: '4px 12px', borderRadius: 6,
                  background: platform === p ? 'rgba(255,255,255,0.12)' : 'transparent',
                  color: platform === p ? 'white' : 'rgba(255,255,255,0.45)',
                  border: `1px solid ${platform === p ? 'rgba(255,255,255,0.2)' : 'rgba(255,255,255,0.08)'}`,
                  cursor: 'pointer', fontSize: 12, fontFamily: 'inherit' }}>{l}</button>
            ))}
          </div>
        </div>
        {/* App content */}
        <div style={{ flex: 1, overflow: 'hidden', display: 'flex',
          alignItems: platform === 'ios' ? 'center' : 'stretch',
          justifyContent: platform === 'ios' ? 'center' : 'stretch',
          background: platform === 'ios' ? '#0d0d0d' : 'transparent',
          padding: platform === 'ios' ? '24px' : 0 }}>
          {platform === 'desktop'
            ? <DesktopApp theme={theme} interactive={true} initialScreen={screen} />
            : <IOSApp theme={theme} initialScreen={screen} />}
        </div>
      </div>
    );
  }

  /* ── Compare mode ── */
  return (
    <div style={{ minHeight: '100vh', background: '#111', fontFamily: "'Inter','Noto Sans TC',sans-serif" }}>
      {/* Header */}
      <div style={{ height: 54, padding: '0 40px', display: 'flex', alignItems: 'center',
        borderBottom: '1px solid rgba(255,255,255,0.07)', position: 'sticky', top: 0,
        background: '#111', zIndex: 20 }}>
        <div style={{ display: 'flex', alignItems: 'baseline', gap: 10, marginRight: 36 }}>
          <span style={{ color: 'white', fontWeight: 700, fontSize: 16, letterSpacing: '-0.5px' }}>DevFlow</span>
          <span style={{ color: 'rgba(255,255,255,0.3)', fontSize: 13 }}>設計探索</span>
        </div>
        <div style={{ display: 'flex', gap: 2 }}>
          {SCREENS.map(s => (
            <button key={s.id} onClick={() => setScreen(s.id)}
              style={{ padding: '5px 12px', borderRadius: 6,
                background: screen === s.id ? 'rgba(255,255,255,0.1)' : 'transparent',
                color: screen === s.id ? 'white' : 'rgba(255,255,255,0.42)',
                border: 'none', cursor: 'pointer', fontSize: 13,
                fontFamily: 'inherit', fontWeight: screen === s.id ? 600 : 400 }}>
              {s.label}
            </button>
          ))}
        </div>
        <div style={{ marginLeft: 'auto', fontSize: 12, color: 'rgba(255,255,255,0.25)' }}>
          點擊預覽卡片進入全互動探索 →
        </div>
      </div>

      {/* Compare grid */}
      <div style={{ padding: '36px 40px', display: 'flex', gap: 24 }}>
        {['A','B','C'].map(tid => {
          const theme = themes[tid];
          return (
            <div key={tid} style={{ flex: 1, display: 'flex', flexDirection: 'column', gap: 14, minWidth: 0 }}>
              {/* Label */}
              <div style={{ display: 'flex', alignItems: 'center', gap: 10 }}>
                <span style={{ width: 24, height: 24, borderRadius: 6, background: theme.accent,
                  display: 'inline-flex', alignItems: 'center', justifyContent: 'center',
                  fontSize: 12, fontWeight: 700, color: 'white', flexShrink: 0 }}>{tid}</span>
                <span style={{ color: 'rgba(255,255,255,0.8)', fontSize: 14, fontWeight: 600 }}>{theme.name}</span>
              </div>
              {/* Preview card */}
              <div style={{ borderRadius: 12, overflow: 'hidden', position: 'relative',
                boxShadow: '0 8px 48px rgba(0,0,0,0.6)', border: '1px solid rgba(255,255,255,0.07)',
                cursor: 'pointer', height: 330 }}
                onClick={() => { setExpTheme(tid); setMode('explore'); }}>
                {/* Scaled app preview */}
                <div style={{ transform: 'scale(0.455)', transformOrigin: 'top left',
                  width: 960, height: 726, position: 'absolute', pointerEvents: 'none' }}>
                  <DesktopApp key={screen + tid} theme={theme} initialScreen={screen} interactive={false} />
                </div>
                {/* Hover overlay */}
                <div className="hover-layer" style={{ position: 'absolute', inset: 0, display: 'flex',
                  alignItems: 'center', justifyContent: 'center', opacity: 0,
                  background: 'rgba(0,0,0,0.35)', transition: 'opacity .2s' }}
                  onMouseEnter={e => e.currentTarget.style.opacity = 1}
                  onMouseLeave={e => e.currentTarget.style.opacity = 0}>
                  <span style={{ color: 'white', fontSize: 14, fontWeight: 600,
                    background: 'rgba(0,0,0,0.6)', padding: '8px 18px',
                    borderRadius: 8, backdropFilter: 'blur(4px)' }}>
                    探索此主題 →
                  </span>
                </div>
              </div>
              {/* CTA */}
              <button onClick={() => { setExpTheme(tid); setMode('explore'); }}
                style={{ padding: '10px', borderRadius: 8,
                  background: 'rgba(255,255,255,0.06)',
                  color: 'rgba(255,255,255,0.7)', border: '1px solid rgba(255,255,255,0.1)',
                  cursor: 'pointer', fontSize: 13, fontFamily: 'inherit', fontWeight: 500,
                  transition: 'background .15s' }}
                onMouseEnter={e => e.currentTarget.style.background = 'rgba(255,255,255,0.12)'}
                onMouseLeave={e => e.currentTarget.style.background = 'rgba(255,255,255,0.06)'}>
                探索主題 {tid} →
              </button>
            </div>
          );
        })}
      </div>

      {/* Tweaks panel */}
      {tweaks && (
        <div style={{ position: 'fixed', bottom: 24, right: 24, background: '#2a2827',
          border: '1px solid rgba(255,255,255,0.12)', borderRadius: 12, padding: '18px 20px',
          width: 210, boxShadow: '0 20px 60px rgba(0,0,0,.6)', fontFamily: 'inherit', zIndex: 100 }}>
          <div style={{ color: 'white', fontWeight: 600, fontSize: 14, marginBottom: 14 }}>Tweaks</div>
          <div style={{ fontSize: 11, color: 'rgba(255,255,255,0.4)', marginBottom: 8,
            textTransform: 'uppercase', letterSpacing: '0.6px' }}>預覽畫面</div>
          {SCREENS.map(s => (
            <button key={s.id} onClick={() => setScreen(s.id)}
              style={{ display: 'block', width: '100%', textAlign: 'left',
                padding: '6px 10px', borderRadius: 6, marginBottom: 2,
                background: screen === s.id ? 'rgba(255,255,255,0.12)' : 'transparent',
                color: screen === s.id ? 'white' : 'rgba(255,255,255,0.55)',
                border: 'none', cursor: 'pointer', fontSize: 13, fontFamily: 'inherit' }}>
              {s.label}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
