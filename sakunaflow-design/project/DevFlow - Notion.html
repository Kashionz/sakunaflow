<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>DevFlow — Notion 溫潤</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Noto+Sans+TC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body, #root { width: 100%; height: 100%; overflow: hidden; }
  body { font-family: 'Inter','Noto Sans TC',sans-serif; -webkit-font-smoothing: antialiased; }
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.12); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(0,0,0,0.2); }
</style>
</head>
<body>
<div id="root"></div>
<script src="devflow/data.js"></script>
<script src="devflow/themes.js"></script>
<script type="text/babel" src="devflow/components.jsx"></script>
<script type="text/babel">
const { useState, useEffect } = React;

const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "themeId": "A",
  "screen": "today",
  "platform": "desktop"
}/*EDITMODE-END*/;

const SCREENS = [
  { id: 'today',    label: '今日' },
  { id: 'pomodoro', label: '番茄鐘' },
  { id: 'calendar', label: '月曆' },
  { id: 'projects', label: '專案' },
  { id: 'stats',    label: '統計' },
  { id: 'settings', label: '設定' },
];

function App() {
  const [themeId,   setThemeId]  = useState(TWEAK_DEFAULTS.themeId   || 'A');
  const [screen,    setScreen]   = useState(TWEAK_DEFAULTS.screen     || 'today');
  const [platform,  setPlatform] = useState(TWEAK_DEFAULTS.platform   || 'desktop');
  const [tweaks,    setTweaks]   = useState(false);

  const theme = window.DF_THEMES[themeId];

  useEffect(() => {
    window.addEventListener('message', e => {
      if (e.data?.type === '__activate_edit_mode')   setTweaks(true);
      if (e.data?.type === '__deactivate_edit_mode') setTweaks(false);
      if (e.data?.type === '__edit_mode_set_keys') {
        const k = e.data.edits || {};
        if (k.themeId)  setThemeId(k.themeId);
        if (k.screen)   setScreen(k.screen);
        if (k.platform) setPlatform(k.platform);
      }
    });
    window.parent.postMessage({ type: '__edit_mode_available' }, '*');
  }, []);

  const notifyTweaks = (patch) => {
    window.parent.postMessage({ type: '__edit_mode_set_keys', edits: patch }, '*');
  };

  return (
    <div style={{ width: '100vw', height: '100vh', display: 'flex', flexDirection: 'column',
      background: platform === 'ios' ? '#0d0d0d' : theme.bg, overflow: 'hidden',
      fontFamily: theme.font, transition: 'background .3s' }}>

      {/* ── Top chrome bar ── */}
      <div style={{ height: 48, padding: '0 20px', display: 'flex', alignItems: 'center', gap: 12,
        borderBottom: `1px solid ${theme.border}`, flexShrink: 0, background: theme.sidebar.bg,
        zIndex: 10 }}>
        {/* Logo mark */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 8, marginRight: 16 }}>
          <div style={{ width: 24, height: 24, borderRadius: 5, background: theme.accent,
            display: 'flex', alignItems: 'center', justifyContent: 'center' }}>
            <span style={{ color: 'white', fontSize: 12, fontWeight: 700 }}>S</span>
          </div>
          <span style={{ fontSize: 13, fontWeight: 700, color: theme.sidebar.activeText,
            letterSpacing: '-0.2px' }}>SakunaFlow</span>
        </div>
        {/* Screen nav */}
        <div style={{ display: 'flex', gap: 2, flex: 1 }}>
          {SCREENS.map(s => (
            <button key={s.id} onClick={() => { setScreen(s.id); notifyTweaks({ screen: s.id }); }}
              style={{ padding: '4px 12px', borderRadius: 6,
                background: screen === s.id ? `${theme.accent}14` : 'transparent',
                color: screen === s.id ? theme.accent : theme.sidebar.text,
                border: `1px solid ${screen === s.id ? theme.accent + '40' : 'transparent'}`,
                cursor: 'pointer', fontSize: 13, fontFamily: theme.font,
                fontWeight: screen === s.id ? 600 : 400, transition: 'all .15s' }}>
              {s.label}
            </button>
          ))}
        </div>
        {/* Platform toggle */}
        <div style={{ display: 'flex', background: theme.surfaceAlt, borderRadius: theme.radius.sm + 'px',
          border: `1px solid ${theme.border}`, overflow: 'hidden', flexShrink: 0 }}>
          {[['desktop','桌面'],['ios','iOS']].map(([p, l]) => (
            <button key={p} onClick={() => { setPlatform(p); notifyTweaks({ platform: p }); }}
              style={{ padding: '4px 12px', background: platform === p ? theme.accent : 'transparent',
                color: platform === p ? 'white' : theme.text.secondary,
                border: 'none', cursor: 'pointer', fontSize: 12,
                fontFamily: theme.font, fontWeight: 500, transition: 'all .15s' }}>{l}</button>
          ))}
        </div>
        {/* Sync indicator */}
        <div style={{ display: 'flex', alignItems: 'center', gap: 5, fontSize: 12,
          color: theme.text.muted, flexShrink: 0 }}>
          <span style={{ width: 6, height: 6, borderRadius: '50%', background: '#1aae39', display: 'inline-block' }} />
          已同步
        </div>
      </div>

      {/* ── Main content ── */}
      <div style={{ flex: 1, overflow: 'hidden', display: 'flex',
        alignItems: platform === 'ios' ? 'center' : 'stretch',
        justifyContent: platform === 'ios' ? 'center' : 'stretch',
        padding: platform === 'ios' ? '32px' : 0 }}>
        {platform === 'desktop'
          ? <DesktopApp theme={theme} interactive={true} initialScreen={screen} />
          : <IOSApp theme={theme} initialScreen={screen} />}
      </div>

      {/* ── Tweaks panel ── */}
      {tweaks && (
        <div style={{ position: 'fixed', bottom: 24, right: 24, zIndex: 200,
          background: 'rgba(255,255,255,0.96)', border: `1px solid ${theme.border}`,
          borderRadius: theme.radius.lg + 'px', padding: '20px',
          boxShadow: '0 20px 60px rgba(0,0,0,0.15)', width: 220,
          fontFamily: theme.font, backdropFilter: 'blur(12px)' }}>
          <div style={{ fontWeight: 700, fontSize: 14, color: theme.text.primary, marginBottom: 16 }}>Tweaks</div>

          <div style={{ fontSize: 11, fontWeight: 700, color: theme.text.muted, textTransform: 'uppercase',
            letterSpacing: '0.7px', marginBottom: 8 }}>主題</div>
          {['A','B','C'].map(tid => (
            <button key={tid} onClick={() => { setThemeId(tid); notifyTweaks({ themeId: tid }); }}
              style={{ display: 'flex', alignItems: 'center', gap: 8, width: '100%',
                padding: '6px 10px', borderRadius: 6, marginBottom: 3,
                background: themeId === tid ? `${theme.accent}14` : 'transparent',
                color: themeId === tid ? theme.accent : theme.text.secondary,
                border: `1px solid ${themeId === tid ? theme.accent + '40' : 'transparent'}`,
                cursor: 'pointer', fontSize: 13, fontFamily: theme.font,
                fontWeight: themeId === tid ? 600 : 400 }}>
              <span style={{ width: 10, height: 10, borderRadius: '50%',
                background: window.DF_THEMES[tid].accent }} />
              {window.DF_THEMES[tid].name}
            </button>
          ))}

          <div style={{ fontSize: 11, fontWeight: 700, color: theme.text.muted, textTransform: 'uppercase',
            letterSpacing: '0.7px', margin: '14px 0 8px' }}>畫面</div>
          {SCREENS.map(s => (
            <button key={s.id} onClick={() => { setScreen(s.id); notifyTweaks({ screen: s.id }); }}
              style={{ display: 'block', width: '100%', textAlign: 'left', padding: '5px 10px',
                borderRadius: 6, marginBottom: 2,
                background: screen === s.id ? `${theme.accent}14` : 'transparent',
                color: screen === s.id ? theme.accent : theme.text.secondary,
                border: 'none', cursor: 'pointer', fontSize: 13,
                fontFamily: theme.font, fontWeight: screen === s.id ? 600 : 400 }}>
              {s.label}
            </button>
          ))}

          <div style={{ fontSize: 11, fontWeight: 700, color: theme.text.muted, textTransform: 'uppercase',
            letterSpacing: '0.7px', margin: '14px 0 8px' }}>平台</div>
          {[['desktop','🖥 桌面'],['ios','📱 iOS']].map(([p, l]) => (
            <button key={p} onClick={() => { setPlatform(p); notifyTweaks({ platform: p }); }}
              style={{ display: 'block', width: '100%', textAlign: 'left', padding: '5px 10px',
                borderRadius: 6, marginBottom: 2,
                background: platform === p ? `${theme.accent}14` : 'transparent',
                color: platform === p ? theme.accent : theme.text.secondary,
                border: 'none', cursor: 'pointer', fontSize: 13,
                fontFamily: theme.font, fontWeight: platform === p ? 600 : 400 }}>
              {l}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
